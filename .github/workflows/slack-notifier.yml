name: Send PR Details
on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  send-pr-info:
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack Notification
        uses: slackapi/slack-github-action@v1.26.0
        with:
          # This method is more stable than the multi-line '|' block
          payload: "{\"text\":\"🚀 *New PR in ${{ github.event.repository.name }}*\\n*Title:* ${{ github.event.pull_request.title }}\\n*Author:* ${{ github.actor }}\\n*Link:* ${{ github.event.pull_request.html_url }}\"}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
