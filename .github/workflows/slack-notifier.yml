name: PR Slack Notifier

on:
  pull_request:
    types: [opened, reopened]

jobs:
  slack-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Send PR Notification
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🚀 *New PR in ${{ github.event.repository.name }}*\n\n*Title:* ${{ github.event.pull_request.title }}\n*Author:* ${{ github.actor }}\n*Link:* ${{ github.event.pull_request.html_url }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Pull Request"
                      },
                      "url": "${{ github.event.pull_request.html_url }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
