name: "afv-library Fancy Slack Notifier"

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  slack-fancy-notify:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read
    steps:
      - name: "Fetch Details and Post to Slack"
        uses: actions/github-script@v7
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          script: |
            const pr = context.payload.pull_request;
            const repoName = context.repo.repo;
            
            // Get stats
            const additions = pr.additions;
            const deletions = pr.deletions;
            const changedFiles = pr.changed_files;
            
            // Build the message string
            const message = `📚 *afv-library PR Submission*\n` +
                            `------------------------------------------\n` +
                            `*Title:* ${pr.title}\n` +
                            `*Author:* \`${pr.user.login}\`\n` +
                            `*Stats:* +${additions} / -${deletions} lines (${changedFiles} files)\n` +
                            `*Action:* <${pr.html_url}|🔍 Review Pull Request>`;

            // Send to Slack using a simple fetch call
            const fetch = require('node-fetch');
            await fetch(process.env.SLACK_WEBHOOK_URL, {
              method: 'POST',
              body: JSON.stringify({ text: message }),
              headers: { 'Content-Type': 'application/json' }
            });
