name: "afv-library Fancy Slack Notifier"

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  slack-fancy-notify:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read
    steps:
      - name: "Fetch Details and Post to Slack"
        uses: actions/github-script@v7
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          script: |
            const https = require('https');
            const pr = context.payload.pull_request;
            
            // Stats from the context
            const additions = pr.additions;
            const deletions = pr.deletions;
            const changedFiles = pr.changed_files;
            
            const message = `📚 *afv-library PR Submission*\n` +
                            `------------------------------------------\n` +
                            `*Title:* ${pr.title}\n` +
                            `*Author:* \`${pr.user.login}\`\n` +
                            `*Stats:* +${additions} / -${deletions} lines (${changedFiles} files)\n` +
                            `*Action:* <${pr.html_url}|🔍 Review Pull Request>`;

            const url = new URL(process.env.SLACK_WEBHOOK_URL);
            const options = {
              hostname: url.hostname,
              path: url.pathname + url.search,
              method: 'POST',
              headers: { 'Content-Type': 'application/json' }
            };

            const req = https.request(options, (res) => {
              res.on('data', () => {});
            });

            req.on('error', (e) => { console.error(e); });
            req.write(JSON.stringify({ text: message }));
            req.end();
