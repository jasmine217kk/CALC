name: PR Slack Notifier

on:
  pull_request:
    types: [opened, reopened]

jobs:
  slack-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Send PR Notification
        uses: slackapi/slack-github-action@v1.26.0
        with:
          # We use the 'payload' key with a JSON string to prevent the action from flattening it
          payload: |
            {
              "text": "🚀 New PR in ${{ github.event.repository.name }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🚀 *New PR in ${{ github.event.repository.name }}*\n\n*Title:* ${{ github.event.pull_request.title }}\n*Author:* ${{ github.actor }}\n*Link:* ${{ github.event.pull_request.html_url }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
